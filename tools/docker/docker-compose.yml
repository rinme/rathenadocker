version: "3.7"

services:
  db:
    image: "mariadb:noble"
    container_name: "rathena-db"
    ports:
      - "${DB_PORT:-3306}:3306"
    volumes:
      - "rathenadb:/var/lib/mysql"
      - "../../sql-files/:/docker-entrypoint-initdb.d"
    environment:
      MYSQL_ROOT_PASSWORD: ${DB_ROOT_PASSWORD:-ragnarok}
      MYSQL_DATABASE: ${DB_DATABASE:-ragnarok}
      MYSQL_USER: ${DB_USER:-ragnarok}
      MYSQL_PASSWORD: ${DB_PASSWORD:-ragnarok}

  builder:
    image: "rathena:local"
    container_name: "rathena-builder"
    command: "/rathena/tools/docker/builder.sh"
    volumes:
      - "../..:/rathena"
      - "./asset/inter_conf.txt:/rathena/conf/import/inter_conf.txt"
      - "./asset/char_conf.txt:/rathena/conf/import/char_conf.txt"
      - "./asset/map_conf.txt:/rathena/conf/import/map_conf.txt"
    init: true
    tty: true
    stdin_open: true
    build:
      context: .
      dockerfile: Dockerfile
    environment:
      BUILDER_CONFIGURE: "--enable-packetver=${PACKET_VER:-20211103}"

  login:
    image: "rathena:local"
    container_name: "rathena-login"
    command: sh -c "/bin/wait-for db:3306 -- /rathena/login-server"
    ports:
      - "${LOGIN_PORT:-6900}:6900"
    volumes:
      - "../..:/rathena"
      - "./asset/inter_conf.txt:/rathena/conf/import/inter_conf.txt"
      - "./asset/char_conf.txt:/rathena/conf/import/char_conf.txt"
      - "./asset/map_conf.txt:/rathena/conf/import/map_conf.txt"
    init: true
    tty: true
    stdin_open: true
    build:
      context: .
      dockerfile: Dockerfile
    depends_on:
      - db

  char:
    image: "rathena:local"
    container_name: "rathena-char"
    command: sh -c "/bin/wait-for db:3306 -- /rathena/char-server"
    ports:
      - "${CHAR_PORT:-6121}:6121"
    volumes:
      - "../..:/rathena"
      - "./asset/inter_conf.txt:/rathena/conf/import/inter_conf.txt"
      - "./asset/char_conf.txt:/rathena/conf/import/char_conf.txt"
      - "./asset/map_conf.txt:/rathena/conf/import/map_conf.txt"
    init: true
    tty: true
    stdin_open: true
    build:
      context: .
      dockerfile: Dockerfile
    depends_on:
      - login

  map:
    image: "rathena:local"
    container_name: "rathena-map"
    command: sh -c "/bin/wait-for db:3306 -- /rathena/map-server"
    ports:
      - "${MAP_PORT:-5121}:5121"
    volumes:
      - "../..:/rathena"
      - "./asset/inter_conf.txt:/rathena/conf/import/inter_conf.txt"
      - "./asset/char_conf.txt:/rathena/conf/import/char_conf.txt"
      - "./asset/map_conf.txt:/rathena/conf/import/map_conf.txt"
    init: true
    tty: true
    stdin_open: true
    build:
      context: .
      dockerfile: Dockerfile
    depends_on:
      - char

  # --- New Services Below ---

  phpmyadmin:
    image: "phpmyadmin:latest"
    container_name: "rathena-pma"
    ports:
      - "${PMA_PORT:-8080}:80"
    environment:
      PMA_HOST: db
      MYSQL_ROOT_PASSWORD: ${DB_ROOT_PASSWORD:-ragnarok}
    depends_on:
      - db

  fluxcp:
    image: "php:8.2-apache"
    container_name: "rathena-fluxcp"
    # Installs the database extensions FluxCP needs before starting Apache
    command: sh -c "docker-php-ext-install pdo_mysql mysqli && apache2-foreground"
    ports:
      - "${FLUXCP_PORT:-8000}:80"
    volumes:
      - "./fluxcp:/var/www/html" # Map local folder directly to web root
    depends_on:
      - db

volumes:
  rathenadb:
